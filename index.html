<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arabic Keyboard Fixer</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#f4f4f4;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
.container{background:white;padding:30px;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.1);max-width:700px;width:90%}
h1{margin-top:0}
textarea{width:100%;height:120px;margin-top:10px;padding:10px;font-size:16px}
button{margin-top:10px;margin-right:8px;padding:10px 18px;font-size:16px;border:none;border-radius:8px;background:#007bff;color:white;cursor:pointer}
button:hover{background:#0056b3}
.result{margin-top:15px;font-size:20px;border-top:1px solid #ddd;padding-top:10px}
.rtl{direction:rtl}
</style>
</head>
<body>
<div class="container">
<h1>Arabic Keyboard Translator</h1>
<p>Fix text typed with the wrong keyboard layout.</p>

<label><b>Input</b></label>
<textarea id="input" placeholder="Examples: hojfhv  OR  فثسف"></textarea>

<button onclick="toArabic()">English → Arabic</button>
<button onclick="toEnglish()">Arabic → English</button>

<div class="result" id="output"></div>
</div>

<script>
const enToAr = {
'q':'ض','w':'ص','e':'ث','r':'ق','t':'ف','y':'غ','u':'ع','i':'ه','o':'خ','p':'ح','[':'ج',']':'د',
'a':'ش','s':'س','d':'ي','f':'ب','g':'ل','h':'ا','j':'ت','k':'ن','l':'م',';':'ك','\'':'ط',
'z':'ئ','x':'ء','c':'ؤ','v':'ر','b':'لا','n':'ى','m':'ة',',':'و','.':'ز','/':'ظ'
};

const arToEn = {};
for (const key in enToAr) {
  arToEn[enToAr[key]] = key;
}

function toArabic(){
const input=document.getElementById('input').value.toLowerCase();
let result='';
for(let ch of input){
result += enToAr[ch] ?? ch;
}
const out=document.getElementById('output');
out.classList.add('rtl');
out.textContent=result;
}

function toEnglish(){
const input=document.getElementById('input').value;
let result='';
for(let ch of input){
result += arToEn[ch] ?? ch;
}
const out=document.getElementById('output');
out.classList.remove('rtl');
out.textContent=result;
}
</script>
</body>
</html>
